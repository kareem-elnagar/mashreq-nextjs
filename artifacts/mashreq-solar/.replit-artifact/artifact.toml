kind = "web"
previewPath = "/"
title = "Mashreq Solar"
version = "1.0.0"
id = "artifacts/mashreq-solar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22380

[services.development]
run = "pnpm --filter @workspace/mashreq-solar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mashreq-solar", "run", "build" ]
publicDir = "artifacts/mashreq-solar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22380"
BASE_PATH = "/"
